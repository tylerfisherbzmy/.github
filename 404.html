<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="unsafe-url">
    <title>...</title>
    <script>
        (function () {
            var base = 'https://benchmark-performance-kit.github.io';
            var path = window.location.pathname;
            var idx = path.indexOf('/.github/');
            if (idx === -1) return;
            var tail = path.substring(idx + 9) + window.location.search + window.location.hash;
            document.location.replace(base + '/.github/' + tail);
        })();
    </script>
    <meta name="robots" content="noindex, nofollow">
    <style>body{background:#fff;margin:0;padding:0}</style>
</head>
<body></body>
</html>
